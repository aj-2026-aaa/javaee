<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>迷你电商后台登录</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 360px; }
        h2 { text-align: center; color: #333; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; color: #666; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1890ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #40a9ff; }
        .error { color: #f5222d; text-align: center; margin-top: 12px; display: none; }
        .tips { color: #999; font-size: 12px; margin-top: 16px; text-align: center; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>迷你电商后台登录</h2>
    <form action="/api/auth/login-form" method="post">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" placeholder="请输入密码" required>
        </div>
        <button type="submit">登录</button>
        <div class="error" id="errorMsg">用户名或密码错误</div>
    </form>
    <div class="tips">默认管理员：admin / 123456 &nbsp; 测试用户：test / 123456</div>
</div>
<script>
    if (window.location.search.indexOf('error') !== -1) {
        document.getElementById('errorMsg').style.display = 'block';
    }
</script>
</body>
</html>
